default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL") { "postgres://alea:alea_dev@localhost:5432/alea_development" } %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL_TEST") { "postgres://alea:alea_dev@localhost:5432/alea_test" } %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
